[features]
multi_agent = true

[agents."code-reviewer"]
description = "Gateway reviewer for non-trivial changes"
config_file = "agents/code-reviewer.toml"

[agents."test-reviewer"]
description = "Test quality and TDD reviewer"
config_file = "agents/test-reviewer.toml"

[agents."architecture-reviewer"]
description = "Architecture and boundary reviewer"
config_file = "agents/architecture-reviewer.toml"

[agents."security-reviewer"]
description = "Security and privacy reviewer"
config_file = "agents/security-reviewer.toml"

[agents."config-reviewer"]
description = "Tooling and configuration reviewer"
config_file = "agents/config-reviewer.toml"
