# Dependabot version updates. Security updates are enabled separately in repo
# settings; this file adds scheduled version updates for the two ecosystems this
# repo pins: uv-managed Python dependencies and the SHA-pinned GitHub Actions
# (Dependabot bumps the pinned SHA and the trailing `# vX` comment together).
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
